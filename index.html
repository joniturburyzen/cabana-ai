<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Cabaña</title>

  <script type="importmap">
  {"imports":{
    "three":         "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }}
  </script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif;touch-action:none}
    canvas{position:fixed;top:0;left:0;z-index:0}

    /* ── Loading ──────────────────────────────── */
    #loading{
      position:fixed;inset:0;background:#0c0905;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:16px;z-index:100
    }
    #loading h1{color:#d4a84b;font-size:1.8rem;letter-spacing:.15em;font-weight:300}
    #load-label{color:#7a5e38;font-size:.82rem}
    #bar-wrap{width:220px;height:4px;background:#1e150a;border-radius:2px;overflow:hidden}
    #bar{height:100%;width:0%;background:#d4a84b;transition:width .3s}

    /* ── Joystick ─────────────────────────────── */
    #joy-wrap{
      position:fixed;bottom:44px;left:44px;
      width:112px;height:112px;z-index:15;
      pointer-events:none;display:none
    }
    #joy-ring{
      width:100%;height:100%;
      border:1.5px solid rgba(255,255,255,.22);
      border-radius:50%;background:rgba(0,0,0,.3);
      position:relative
    }
    #joy-dot{
      width:42px;height:42px;
      background:rgba(212,168,75,.65);
      border-radius:50%;
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%)
    }

    /* ── Botón hablar ─────────────────────────── */
    #talk-btn{
      position:fixed;bottom:44px;right:28px;
      background:#d4a84b;border:none;border-radius:40px;
      padding:14px 22px;font-size:.95rem;font-weight:700;
      color:#0c0905;cursor:pointer;z-index:20;
      box-shadow:0 4px 18px rgba(0,0,0,.55);
      display:none;-webkit-tap-highlight-color:transparent
    }

    /* ── Chat ─────────────────────────────────── */
    #chat{
      position:fixed;bottom:0;left:0;right:0;
      background:rgba(12,9,5,.96);
      border-top:1px solid rgba(212,168,75,.2);
      border-radius:16px 16px 0 0;
      display:none;flex-direction:column;
      max-height:52vh;z-index:30;
      box-shadow:0 -4px 28px rgba(0,0,0,.7)
    }
    #chat-head{
      padding:11px 16px;
      border-bottom:1px solid rgba(212,168,75,.12);
      color:#d4a84b;font-size:.82rem;font-weight:600;

    #chat-x{background:none;border:none;color:#7a5e38;font-size:1.1rem;cursor:pointer;padding:0 2px}
    #msgs{
      flex:1;overflow-y:auto;padding:11px 13px;
      display:flex;flex-direction:column;gap:7px;
      scrollbar-width:thin;scrollbar-color:#2a1e0e transparent
    }
    .m{max-width:85%;padding:8px 12px;border-radius:12px;font-size:.83rem;line-height:1.45;word-break:break-word}
    .m.u{align-self:flex-end;background:rgba(212,168,75,.16);color:#eed898;border-bottom-right-radius:3px}
    .m.a{align-self:flex-start;background:rgba(60,35,12,.7);color:#c49a5a;border-bottom-left-radius:3px}
    .m.t{font-style:italic;opacity:.55}
    #inp-row{display:flex;gap:7px;padding:9px 12px 14px;border-top:1px solid rgba(212,168,75,.1)}
    #txt{
      flex:1;background:rgba(255,255,255,.05);
      border:1px solid rgba(212,168,75,.18);border-radius:9px;
      padding:9px 12px;color:#eed898;font-size:.88rem;
      outline:none;resize:none;min-height:38px;max-height:76px;font-family:inherit
    }
    #txt::placeholder{color:rgba(212,168,75,.3)}
    #snd{
      background:rgba(212,168,75,.2);border:1px solid rgba(212,168,75,.28);
      border-radius:9px;padding:0 15px;color:#d4a84b;font-size:1rem;cursor:pointer;min-width:46px
    }
    #snd:disabled{opacity:.38}
  </style>
</head>
<body>

<div id="loading">
  <h1>CABAÑA</h1>
  <p id="load-label">Cargando…</p>
  <div id="bar-wrap"><div id="bar"></div></div>
</div>

<div id="joy-wrap"><div id="joy-ring"><div id="joy-dot"></div></div></div>
<button id="talk-btn">💬 Hablar</button>

<div id="chat">
  <div id="chat-head">
    <span>Vinayagar</span>
    <button id="chat-x">✕</button>
  </div>
  <div id="msgs"></div>
  <div id="inp-row">
    <textarea id="txt" rows="1" placeholder="Escribe…"></textarea>
    <button id="snd">➤</button>
  </div>
</div>

<script type="module">
import * as THREE  from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { FBXLoader }   from 'three/addons/loaders/FBXLoader.js';

/* ═══════════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════════ */
const WORKER_URL    = 'https://empty-silence-364e.joniturbu.workers.dev/';
const SYSTEM_PROMPT = `Eres Vinayagar, un espíritu sabio que habita esta cabaña.
Responde en español, con frases breves y evocadoras. Máximo 2-3 oraciones.`;
const EYE_H   = 1.55;   // altura de ojos (m)
const WALL_M  = 0.32;   // margen de colisión con paredes
const SPD     = 2.6;    // velocidad de cámara (m/s)
const JR      = 48;     // radio joystick (px)

/* ═══════════════════════════════════════════════════════════
   THREE.JS
═══════════════════════════════════════════════════════════ */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.outputColorSpace   = THREE.SRGBColorSpace;
renderer.toneMapping        = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
document.body.insertBefore(renderer.domElement, document.body.firstChild);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c0905);
scene.fog = new THREE.Fog(0x0c0905, 10, 40);

const camera = new THREE.PerspectiveCamera(68, innerWidth / innerHeight, 0.05, 60);
camera.rotation.order = 'YXZ';

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Luces
scene.add(new THREE.AmbientLight(0xfff0d0, 0.5));
const fireLight = new THREE.PointLight(0xff8830, 3.0, 8);
fireLight.castShadow = true;
scene.add(fireLight);
const fill = new THREE.DirectionalLight(0xffeedd, 0.4);
fill.position.set(1, 3, 1);
scene.add(fill);

/* ═══════════════════════════════════════════════════════════
   COLISIÓN / GRAVEDAD
═══════════════════════════════════════════════════════════ */
let   colMeshes = [];
const rc        = new THREE.Raycaster();
const _dn       = new THREE.Vector3(0, -1, 0);
const _ro       = new THREE.Vector3();
const _wd       = new THREE.Vector3();
let   groundY   = 0;

function stickToFloor() {
  if (!colMeshes.length) { camera.position.y = groundY + EYE_H; return; }
  _ro.set(camera.position.x, camera.position.y + 0.8, camera.position.z);
  rc.set(_ro, _dn); rc.far = 5;
  const h = rc.intersectObjects(colMeshes, false);
  if (h.length) { groundY = h[0].point.y; }
  camera.position.y = groundY + EYE_H;
}

function blocked(dir, margin) {
  if (!colMeshes.length) return false;
  _wd.copy(dir).normalize();
  rc.set(camera.position, _wd); rc.far = margin;
  return rc.intersectObjects(colMeshes, false).length > 0;
}

/* ═══════════════════════════════════════════════════════════
   LOADERS
═══════════════════════════════════════════════════════════ */
const draco = new DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/libs/draco/');
const gltfL = new GLTFLoader(); gltfL.setDRACOLoader(draco);
const fbxL  = new FBXLoader();

function setP(v, t) {
  document.getElementById('bar').style.width = v + '%';
  document.getElementById('load-label').textContent = t;
}

/* ═══════════════════════════════════════════════════════════
   CARGA CABAÑA — auto-escala + cámara dentro
═══════════════════════════════════════════════════════════ */
let cabinBounds = new THREE.Box3();

async function loadCabin() {
  setP(5, 'Cabaña…');
  return new Promise((res, rej) => {
    gltfL.load('RECURSOS/caba%C3%B1apruebainterior.glb', (gltf) => {
      const cabin = gltf.scene;

      // — Escala forzada: el eje más largo de la planta = 14 m
      const raw  = new THREE.Box3().setFromObject(cabin);
      const sz   = raw.getSize(new THREE.Vector3());
      const maxD = Math.max(sz.x, sz.z);
      if (maxD > 0.001) cabin.scale.setScalar(14 / maxD);

      // — Suelo a y = 0
      const box2 = new THREE.Box3().setFromObject(cabin);
      cabin.position.y -= box2.min.y;

      cabin.traverse(n => {
        if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; colMeshes.push(n); }
      });
      scene.add(cabin);

      // Bounds finales
      cabinBounds.setFromObject(cabin);
      const c  = cabinBounds.getCenter(new THREE.Vector3());
      const s2 = cabinBounds.getSize(new THREE.Vector3());

      console.log('Cabin bounds:', JSON.stringify({
        cx: c.x.toFixed(2), cy: c.y.toFixed(2), cz: c.z.toFixed(2),
        sx: s2.x.toFixed(2), sy: s2.y.toFixed(2), sz: s2.z.toFixed(2)
      }));

      fireLight.position.set(c.x - s2.x * 0.28, 1.4, c.z - s2.z * 0.28);

      // Cámara al centro exacto de la planta, a ojo de altura
      camera.position.set(c.x, cabinBounds.min.y + EYE_H, c.z);
      groundY = cabinBounds.min.y;
      camYaw  = Math.PI * 0.75;   // diagonal para ver la habitación
      camPitch = -0.08;

      setP(42, 'Cabaña lista');
      res({ center: c, size: s2 });
    },
    xhr => { if (xhr.total) setP(5 + (xhr.loaded/xhr.total)*35, 'Cabaña…'); },
    rej);
  });
}

/* ═══════════════════════════════════════════════════════════
   AVATAR — FBX + placeholder
═══════════════════════════════════════════════════════════ */
let charWrap   = null;
let mixer      = null;
let idleClip   = null;
let talkClip   = null;
let avatarHead = null;
let avatarT    = 0;
let avatarState = 'idle'; // 'idle'|'walk'|'talking'

// Waypoints se generan después de saber el tamaño de la cabaña
let waypoints = [];
let wpIdx = 0;
const CHAR = { waitT: 0, rotY: 0, speed: 0.7 };
const _toWP = new THREE.Vector3();

function buildWaypoints(c, s) {
  const mx = s.x * 0.32, mz = s.z * 0.32;
  waypoints = [
    new THREE.Vector3(c.x - mx, 0, c.z - mz),
    new THREE.Vector3(c.x + mx, 0, c.z - mz),
    new THREE.Vector3(c.x + mx, 0, c.z + mz),
    new THREE.Vector3(c.x - mx, 0, c.z + mz),
    new THREE.Vector3(c.x,      0, c.z),
    new THREE.Vector3(c.x - mx * 0.5, 0, c.z + mz * 0.6),
  ];
}

function createPlaceholder(center) {
  const g = new THREE.Group();
  g.position.set(center.x, 0, center.z);
  const mB = new THREE.MeshStandardMaterial({ color: 0x7755aa, emissive: 0x220033, roughness: 0.6 });
  const mH = new THREE.MeshStandardMaterial({ color: 0xcc9966, emissive: 0x221100, roughness: 0.5 });
  const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.13, 0.52, 10), mB);
  torso.position.y = 1.28; torso.castShadow = true; g.add(torso);
  avatarHead = new THREE.Mesh(new THREE.SphereGeometry(0.14, 12, 8), mH);
  avatarHead.position.y = 1.72; avatarHead.castShadow = true; g.add(avatarHead);
  scene.add(g); charWrap = g;
}

async function loadAvatar(center) {
  setP(44, 'Personaje…');
  return new Promise(res => {
    fbxL.load('RECURSOS/Vinayagar.fbx', obj => {
      const w = new THREE.Group();
      w.position.set(center.x, 0, center.z);
      obj.scale.setScalar(0.01);
      obj.traverse(n => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
      w.add(obj);
      scene.add(w);
      mixer   = new THREE.AnimationMixer(obj);
      charWrap = w;
      // Buscar clips idle / talk dentro del FBX
      const findC = kws => obj.animations.find(c => kws.some(k => c.name.toLowerCase().includes(k)));
      idleClip = findC(['idle', 'stand']);
      talkClip = findC(['talk', 'speak']);
      if (idleClip) { const a = mixer.clipAction(idleClip); a.setLoop(THREE.LoopRepeat); a.play(); }
      setP(75, 'Personaje listo');
      res();
    },
    xhr => { if (xhr.total) setP(44 + (xhr.loaded/xhr.total)*28, 'Personaje…'); },
    err => {
      console.warn('FBX fallback placeholder:', err.message);
      createPlaceholder(center);
      setP(75, 'Personaje (placeholder)');
      res();
    });
  });
}

/* ═══════════════════════════════════════════════════════════
   IA AUTÓNOMA DEL PERSONAJE
═══════════════════════════════════════════════════════════ */
function updateCharAI(dt) {
  if (!charWrap || !waypoints.length) return;

  // Mientras habla: girar hacia la cámara
  if (avatarState === 'talking') {
    _toWP.subVectors(camera.position, charWrap.position);
    const tA = Math.atan2(_toWP.x, _toWP.z);
    CHAR.rotY += (tA - CHAR.rotY) * Math.min(dt * 4, 1);
    charWrap.rotation.y = CHAR.rotY;
    return;
  }

  // Esperar
  if (CHAR.waitT > 0) { CHAR.waitT -= dt; avatarState = 'idle'; return; }

  // Mover hacia waypoint
  avatarState = 'walk';
  const wp  = waypoints[wpIdx];
  _toWP.set(wp.x - charWrap.position.x, 0, wp.z - charWrap.position.z);
  const d = _toWP.length();
  if (d < 0.12) {
    wpIdx = (wpIdx + 1) % waypoints.length;
    CHAR.waitT = 1.2 + Math.random() * 2.8;
  } else {
    _toWP.normalize();
    charWrap.position.x += _toWP.x * CHAR.speed * dt;
    charWrap.position.z += _toWP.z * CHAR.speed * dt;
    const tA = Math.atan2(_toWP.x, _toWP.z);
    CHAR.rotY += (tA - CHAR.rotY) * Math.min(dt * 6, 1);
    charWrap.rotation.y = CHAR.rotY;
  }
}

// Animación procedural del placeholder
let phT = 0;
function updatePlaceholder(dt) {
  if (!avatarHead) return;
  phT += dt;
  if (avatarState !== 'talking') {
    avatarHead.position.y = 1.72 + Math.sin(phT * 1.1) * 0.007;
    avatarHead.rotation.z = 0;
  } else {
    avatarHead.position.y = 1.72 + Math.sin(phT * 9) * 0.018;
    avatarHead.rotation.z = Math.sin(phT * 11) * 0.04;
  }
}

// Transición de animación cuando habla / para
let talkTimer = null;
function startTalking(len) {
  avatarState = 'talking';
  clearTimeout(talkTimer);
  if (mixer && idleClip && talkClip) {
    const iA = mixer.clipAction(idleClip);
    const tA = mixer.clipAction(talkClip);
    iA.crossFadeTo(tA, 0.3, false); tA.reset().play();
  }
  talkTimer = setTimeout(stopTalking, Math.max(2000, Math.min(len * 65, 8000)));
}
function stopTalking() {
  avatarState = 'idle';
  if (mixer && idleClip && talkClip) {
    const iA = mixer.clipAction(idleClip);
    const tA = mixer.clipAction(talkClip);
    tA.crossFadeTo(iA, 0.5, false); iA.reset().play();
  }
}

/* ═══════════════════════════════════════════════════════════
   GROQ / CHAT
═══════════════════════════════════════════════════════════ */
const history = [{ role: 'system', content: SYSTEM_PROMPT }];

async function askGroq(text) {
  history.push({ role: 'user', content: text });
  const div = addMsg('…', 'a t');
  try {
    const r = await fetch(WORKER_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        query: text,                          // worker antiguo
        model: 'llama-3.3-70b-versatile',    // worker nuevo
        messages: history,
        max_tokens: 200,
        temperature: 0.85
      })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();

    // Soporta worker antiguo { texto } y worker nuevo { choices }
    let reply;
    if (d.choices && d.choices[0]) {
      reply = d.choices[0].message.content.trim();
    } else if (d.texto) {
      reply = d.texto;
    } else {
      throw new Error('Respuesta inesperada: ' + JSON.stringify(d).slice(0, 80));
    }

    history.push({ role: 'assistant', content: reply });
    div.className = 'm a'; div.textContent = reply;
    document.getElementById('msgs').scrollTop = 9999;
    startTalking(reply.length);
  } catch (e) {
    div.className = 'm a'; div.textContent = '[Error: ' + e.message + ']';
    console.error('askGroq error:', e);
  }
}

function addMsg(txt, cls) {
  const d = document.createElement('div');
  d.className = 'm ' + cls; d.textContent = txt;
  const msgs = document.getElementById('msgs');
  msgs.appendChild(d); msgs.scrollTop = 9999;
  return d;
}

/* ── Chat UI ──────────────────────────────────────────────── */
let chatOpen = false;
const $chat    = document.getElementById('chat');
const $talkBtn = document.getElementById('talk-btn');
const $snd     = document.getElementById('snd');
const $txt     = document.getElementById('txt');

function openChat()  { chatOpen = true;  $chat.style.display = 'flex'; $talkBtn.style.display = 'none'; setTimeout(() => $txt.focus(), 60); }
function closeChat() { chatOpen = false; $chat.style.display = 'none'; }

document.getElementById('chat-x').addEventListener('click', closeChat);
$talkBtn.addEventListener('click', openChat);
$snd.addEventListener('click', send);
$txt.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });

async function send() {
  const t = $txt.value.trim(); if (!t) return;
  $txt.value = ''; $snd.disabled = true;
  addMsg(t, 'u');
  await askGroq(t);
  $snd.disabled = false; $txt.focus();
}

/* ═══════════════════════════════════════════════════════════
   CONTROLES TÁCTILES + DESKTOP
═══════════════════════════════════════════════════════════ */
let camYaw = Math.PI, camPitch = -0.05;
const joy  = { on: false, id: null, dx: 0, dy: 0, bx: 0, by: 0 };
const lk   = { on: false, id: null, lx: 0, ly: 0 };
const keys = {};

const $jWrap = document.getElementById('joy-wrap');
const $jDot  = document.getElementById('joy-dot');

document.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Escape') closeChat(); });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

renderer.domElement.addEventListener('touchstart', ts, { passive: false });
renderer.domElement.addEventListener('touchmove',  tm,  { passive: false });
renderer.domElement.addEventListener('touchend',   te,  { passive: false });
renderer.domElement.addEventListener('touchcancel',te,  { passive: false });

function ts(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.clientX < innerWidth * 0.48 && !joy.on) {
      joy.on = true; joy.id = t.identifier;
      joy.bx = t.clientX; joy.by = t.clientY; joy.dx = 0; joy.dy = 0;
      $jWrap.style.left = (t.clientX - 56) + 'px';
      $jWrap.style.top  = (t.clientY - 56) + 'px';
      $jWrap.style.display = 'block';
      $jDot.style.transform = 'translate(-50%,-50%)';
    } else if (!lk.on) {
      lk.on = true; lk.id = t.identifier; lk.lx = t.clientX; lk.ly = t.clientY;
    }
  }
}
function tm(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joy.id) {
      joy.dx = t.clientX - joy.bx; joy.dy = t.clientY - joy.by;
      const l = Math.hypot(joy.dx, joy.dy);
      if (l > JR) { joy.dx *= JR/l; joy.dy *= JR/l; }
      $jDot.style.transform = `translate(calc(-50% + ${joy.dx}px),calc(-50% + ${joy.dy}px))`;
    }
    if (t.identifier === lk.id) {
      camYaw   -= (t.clientX - lk.lx) * 0.0038;
      camPitch -= (t.clientY - lk.ly) * 0.0038;
      camPitch  = Math.max(-1.1, Math.min(1.1, camPitch));
      lk.lx = t.clientX; lk.ly = t.clientY;
    }
  }
}
function te(e) {
  for (const t of e.changedTouches) {
    if (t.identifier === joy.id) { joy.on = false; joy.id = null; joy.dx = 0; joy.dy = 0; $jWrap.style.display = 'none'; }
    if (t.identifier === lk.id)  { lk.on = false; lk.id = null; }
  }
}

// Mouse desktop
let mdown = false, mlx = 0, mly = 0;
renderer.domElement.addEventListener('mousedown', e => { mdown = true; mlx = e.clientX; mly = e.clientY; });
window.addEventListener('mouseup', () => mdown = false);
window.addEventListener('mousemove', e => {
  if (!mdown || chatOpen) return;
  camYaw   -= (e.clientX - mlx) * 0.003; camPitch -= (e.clientY - mly) * 0.003;
  camPitch  = Math.max(-1.1, Math.min(1.1, camPitch));
  mlx = e.clientX; mly = e.clientY;
});

/* ═══════════════════════════════════════════════════════════
   MOVIMIENTO DE CÁMARA CON COLISIÓN
═══════════════════════════════════════════════════════════ */
const _f = new THREE.Vector3(), _r = new THREE.Vector3();
const _mX = new THREE.Vector3(), _mZ = new THREE.Vector3();

function moveCamera(dt) {
  camera.rotation.set(camPitch, camYaw, 0, 'YXZ');
  if (chatOpen) return;

  _f.set(-Math.sin(camYaw), 0, -Math.cos(camYaw));
  _r.set( Math.cos(camYaw), 0, -Math.sin(camYaw));

  let dx = 0, dz = 0;
  if (joy.on) { dx = (joy.dx / JR) * SPD * dt; dz = -(joy.dy / JR) * SPD * dt; }
  if (keys['KeyW'] || keys['ArrowUp'])    dz += SPD * dt;
  if (keys['KeyS'] || keys['ArrowDown'])  dz -= SPD * dt;
  if (keys['KeyA'] || keys['ArrowLeft'])  dx -= SPD * dt;
  if (keys['KeyD'] || keys['ArrowRight']) dx += SPD * dt;

  if (dx !== 0) { _mX.copy(_r).multiplyScalar(dx); if (!blocked(_mX, WALL_M)) camera.position.addScaledVector(_r, dx); }
  if (dz !== 0) { _mZ.copy(_f).multiplyScalar(dz); if (!blocked(_mZ, WALL_M)) camera.position.addScaledVector(_f, dz); }

  stickToFloor();
}

/* ═══════════════════════════════════════════════════════════
   PROXIMIDAD Y BOTÓN HABLAR
═══════════════════════════════════════════════════════════ */
function checkProx() {
  if (!charWrap || chatOpen) return;
  const d = camera.position.distanceTo(charWrap.position);
  $talkBtn.style.display = d < 3.2 ? 'block' : 'none';
}

/* ═══════════════════════════════════════════════════════════
   FUEGO + LOOP
═══════════════════════════════════════════════════════════ */
let fT = 0;
function updateFire(dt) { fT += dt; fireLight.intensity = 2.8 + Math.sin(fT*7.2)*.5 + Math.sin(fT*13.3)*.2; }

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (mixer) mixer.update(dt);
  updateFire(dt);
  updatePlaceholder(dt);
  updateCharAI(dt);
  moveCamera(dt);
  checkProx();
  renderer.render(scene, camera);
}

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
(async () => {
  try {
    const { center, size } = await loadCabin();
    buildWaypoints(center, size);
    await loadAvatar(center);
    setP(100, '¡Listo!');
    await new Promise(r => setTimeout(r, 400));
    // Ocultar loading
    const ld = document.getElementById('loading');
    ld.style.transition = 'opacity .6s'; ld.style.opacity = '0';
    setTimeout(() => ld.style.display = 'none', 700);
    animate();
  } catch (e) {
    document.getElementById('load-label').textContent = 'Error: ' + e.message;
    console.error(e);
  }
})();
</script>
